services:
  # ── VS Code Web + AI Tools ──────────────────────────────────────────
  sandbox:
    build: .
    container_name: dev-sandbox
    depends_on:
      dind:
        condition: service_started
    ports:
      - "${SANDBOX_PORT:-8080}:8080"
    volumes:
      - "./workspace:/workspace"
      - "./home:/home/dev"
    environment:
      - DOCKER_HOST=tcp://dind:2375
      - PASSWORD=${PASSWORD:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - sandbox-net
    restart: unless-stopped

  # ── Docker-in-Docker daemon ─────────────────────────────────────────
  # Runs a fully isolated Docker daemon. Containers you create from the
  # sandbox terminal live inside this container.
  dind:
    image: docker:27-dind
    container_name: dev-sandbox-dind
    privileged: true
    ports:
      # Preview port range — when you run  docker run -p 3000:3000 myapp
      # from the sandbox terminal, the container binds to the DinD
      # container's port 3000, which is forwarded here to the host.
      # Accessible at  http://<host-ip>:3000
      # Expand this range in .env if you need more ports.
      - "${PREVIEW_START:-2000}-${PREVIEW_END:-2020}:2000-2020"
    volumes:
      # Shared workspace — same path in both containers so that
      # docker build contexts and volume mounts (-v /workspace/...)
      # work correctly from the sandbox terminal.
      - "./workspace:/workspace"
      # Persistent Docker data (images, layers, build cache)
      - "./dind-storage:/var/lib/docker"
    environment:
      # Disable TLS — communication is internal on sandbox-net only
      - DOCKER_TLS_CERTDIR=
    networks:
      - sandbox-net
    restart: unless-stopped

networks:
  sandbox-net:
